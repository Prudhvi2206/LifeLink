<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>LifeLink – Blood Donation & Emergency Request System</title>
    <meta name="description" content="Enterprise blood bank management system connecting donors, blood banks, and hospitals on a unified digital platform.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>

    <script
        id="sap-ui-bootstrap"
        src="https://ui5.sap.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.f, sap.tnt, sap.viz, sap.ui.layout, sap.uxap, sap.ui.unified"
        data-sap-ui-resourceroots='{ "lifelink": "./" }'
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted">
    </script>
    <script>
        sap.ui.getCore().attachInit(function () {
            sap.ui.require([
                "lifelink/localService/mockserver",
                "sap/ui/core/ComponentContainer"
            ], function (mockserver, ComponentContainer) {
                // Initialize the mock server
                mockserver.init();

                // Create and place the ComponentContainer programmatically
                new ComponentContainer({
                    name: "lifelink",
                    settings: {
                        id: "lifelink"
                    },
                    async: true,
                    height: "100%"
                }).placeAt("content");
            });
        });
    </script>
</head>
<body class="sapUiBody">
    <div id="content" style="height: 100%;"></div>
</body>
</html>
